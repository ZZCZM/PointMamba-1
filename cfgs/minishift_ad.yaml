# ====== 官方框架必需的全局训练参数 ======
total_bs: 16
step_per_update: 1
max_epoch: 150 # 工业零件重构较难，建议 100-200 epoch

optimizer:
  type: AdamW
  kwargs:
    lr: 0.001
    weight_decay: 0.05

scheduler:
  type: CosLR
  kwargs:
    epochs: 150
    initial_epochs: 10

# ====== 数据集嵌套结构 ======
dataset:
  train:
    _base_:
      NAME: MiniShiftDataset
    others:
      DATA_PATH: /root/autodl-tmp/simple3d/MiniShift1/data/MiniShiftAD
      CATEGORY: capsule
      MODE: train
      LEVEL: ALL
      N_POINTS: 16384
      subset: train
  val:
    _base_:
      NAME: MiniShiftDataset
    others:
      DATA_PATH: /root/autodl-tmp/simple3d/MiniShift1/data/MiniShiftAD
      CATEGORY: capsule
      MODE: test
      LEVEL: ALL
      N_POINTS: 500000
      subset: test

# ====== 模型参数 ======
model:
  NAME: Point_MAE_Mamba_serializationV2
  group_size: 32 
  num_group: 512 
  loss: cdl1 
  rms_norm: False
  mamba_config:
    trans_dim: 384
    depth: 12
    drop_path_rate: 0.1
    encoder_dims: 384
    mask_ratio: 0.6 
    mask_type: rand
    decoder_depth: 4